<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ARBITRAGE Crypto </title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#FFF3D6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ARBITRAGE" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body class="bg-[#FFF3D6] overflow-x-hidden selection:bg-amber-550/20 selection:text-amber-800">
    <div id="root">
      <!-- Premium instant CSS splash loading screen -->
      <div id="splash-screen-pre" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #FFF3D6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #27272a;
        z-index: 9999;
      ">
        <style>
          @keyframes logoScalePulse {
            0%, 100% {
              transform: scale(1) translateY(0);
              box-shadow: 0 15px 30px -10px rgba(245, 158, 11, 0.15);
            }
            50% {
              transform: scale(1.06) translateY(-6px);
              box-shadow: 0 25px 45px -12px rgba(245, 158, 11, 0.3);
            }
          }
          @keyframes spinnerRotation {
            to { transform: rotate(360deg); }
          }
          @keyframes textFadeBlink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
          }
          .splash-box {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background-color: #ffffff;
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: logoScalePulse 2s ease-in-out infinite;
          }
          .splash-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
          }
          .splash-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(245, 158, 11, 0.15);
            border-top: 3px solid #f59e0b;
            border-radius: 50%;
            animation: spinnerRotation 0.8s linear infinite;
          }
          .splash-text {
            font-size: 11px;
            font-weight: 700;
            color: #71717a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: textFadeBlink 1.5s ease-in-out infinite;
            margin-top: 4px;
          }
          .splash-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(245,158,11,0.05) 100%);
            pointer-events: none;
          }
        </style>
        <div class="splash-box">
          <img class="splash-logo" src="/icon.svg" alt="ARBITRAGE" />
          <div class="splash-glow"></div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
          <div class="splash-spinner"></div>
          <span class="splash-text">ARBITRAGE Crypto</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
