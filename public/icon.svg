<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient: Deep rich midnight cosmic space -->
    <radialGradient id="spaceBg" cx="50%" cy="35%" r="70%" fx="50%" fy="25%">
      <stop offset="0%" stop-color="#111c38" />
      <stop offset="50%" stop-color="#0a1024" />
      <stop offset="100%" stop-color="#03050c" />
    </radialGradient>

    <!-- Glowing outer Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>

    <!-- Emerald Ascent (Left part of A / Growth vector) -->
    <linearGradient id="emeraldAscent" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="35%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Indigo/Teal Balance (Right part of A / Trust vector) -->
    <linearGradient id="indigoDescent" x1="100%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="35%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Neon Gold/Mint Bridge Gradient (Horizontal connector) -->
    <linearGradient id="mintBridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Premium Filters for Glow & Shadows -->
    <filter id="heavyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.75"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient Upper Lighting Overlay -->
    <radialGradient id="ambientLight" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base App Icon Container (Premium Squircle) -->
  <rect width="512" height="512" rx="124" fill="url(#spaceBg)"/>
  
  <!-- Subtle Ambient Top Light Glow -->
  <rect width="512" height="512" rx="124" fill="url(#ambientLight)"/>

  <!-- High-Tech Inner Glow Ring -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.85"/>
  <rect x="22" y="22" width="468" height="468" rx="102" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.25"/>

  <!-- Tech Dots Grid Pattern for Premium Geometric Depth -->
  <g opacity="0.14">
    <circle cx="96" cy="96" r="2.5" fill="#34d399"/>
    <circle cx="160" cy="96" r="2.5" fill="#34d399"/>
    <circle cx="224" cy="96" r="2.5" fill="#34d399"/>
    <circle cx="288" cy="96" r="2.5" fill="#34d399"/>
    <circle cx="352" cy="96" r="2.5" fill="#34d399"/>
    <circle cx="416" cy="96" r="2.5" fill="#34d399"/>
    <circle cx="96" cy="160" r="2.5" fill="#34d399"/>
    <circle cx="416" cy="160" r="2.5" fill="#34d399"/>
    <circle cx="96" cy="224" r="2.5" fill="#34d399"/>
    <circle cx="416" cy="224" r="2.5" fill="#34d399"/>
    <circle cx="96" cy="288" r="2.5" fill="#34d399"/>
    <circle cx="416" cy="288" r="2.5" fill="#34d399"/>
    <circle cx="96" cy="352" r="2.5" fill="#34d399"/>
    <circle cx="416" cy="352" r="2.5" fill="#34d399"/>
    <circle cx="96" cy="416" r="2.5" fill="#34d399"/>
    <circle cx="160" cy="416" r="2.5" fill="#34d399"/>
    <circle cx="224" cy="416" r="2.5" fill="#34d399"/>
    <circle cx="288" cy="416" r="2.5" fill="#34d399"/>
    <circle cx="352" cy="416" r="2.5" fill="#34d399"/>
    <circle cx="416" cy="416" r="2.5" fill="#34d399"/>
  </g>

  <!-- Glowing Circular Tech Radar Orbits -->
  <g opacity="0.22" stroke-dasharray="6 12">
    <circle cx="256" cy="256" r="186" fill="none" stroke="#334155" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="144" fill="none" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- Main Dynamic Interlocking "A" Symbol with Premium 3D depth -->
  <g filter="url(#heavyShadow)">
    
    <!-- Indigo/Cyan Descent Curve (Right loop sweeping under) -->
    <path d="M 374,364
             C 414,314 414,234 364,184
             C 324,144 274,124 256,124
             L 256,169
             C 265,169 300,184 330,214
             C 365,249 365,304 330,339
             Z" 
          fill="url(#indigoDescent)"/>

    <!-- Emerald/Mint Ascent Curve (Left loop sweeping over) -->
    <path d="M 138,364
             C 98,314 98,234 148,184
             C 188,144 238,124 256,124
             L 256,169
             C 247,169 212,184 182,214
             C 147,249 147,304 182,339
             Z" 
          fill="url(#emeraldAscent)"/>

    <!-- High-Performance Growth Spear (Left pillar shooting up to peak) -->
    <path d="M 154,374 
             L 245,158 
             L 277,168 
             L 186,384 
             Z" 
          fill="url(#emeraldAscent)"
          filter="url(#neonGlow)"/>

    <!-- High-Performance Trust Spear (Right pillar anchoring the balance) -->
    <path d="M 358,374 
             L 267,158 
             L 235,168 
             L 326,384 
             Z" 
          fill="url(#indigoDescent)"/>

    <!-- The Spearhead Arrow at the top peak, indicating extreme upward motion -->
    <polygon points="256,90 288,144 224,144" fill="#34d399" filter="url(#neonGlow)"/>
    <polygon points="256,106 276,139 236,139" fill="#ffffff"/>

    <!-- Glowing Middle Arbitrage Bridge (The horizontal bar of the 'A') -->
    <rect x="176" y="270" width="160" height="12" rx="6" fill="url(#mintBridge)" filter="url(#neonGlow)"/>
    <rect x="206" y="273" width="100" height="6" rx="3" fill="#ffffff"/>
  </g>

  <!-- Glossy Glass Reflection Overlay for App Store Finish -->
  <path d="M 24,24 
           C 140,24 230,62 302,122 
           C 374,182 432,282 488,400
           C 488,180 450,24 256,24
           Z" 
        fill="#ffffff" 
        opacity="0.045" />
        
  <!-- Glowing Interactive Activity Nodes (Micro Dots) -->
  <circle cx="256" cy="276" r="4.5" fill="#ffffff" filter="url(#neonGlow)"/>
  <circle cx="170" cy="379" r="5" fill="#34d399" filter="url(#neonGlow)"/>
  <circle cx="342" cy="379" r="5" fill="#06b6d4" filter="url(#neonGlow)"/>
  <circle cx="256" cy="122" r="3.5" fill="#a7f3d0" opacity="0.95"/>
</svg>
