<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- Emerald Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#14b8a6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>

    <!-- Metallic Gradient for 'A' -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#a7f3d0"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>

    <!-- Neon Arrow Gradient 1 (Emerald/Teal) -->
    <linearGradient id="arrowGrad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Neon Arrow Gradient 2 (Indigo/Violet) -->
    <linearGradient id="arrowGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Rounded Container (Launcher Shape) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <!-- Subtle Grid Pattern / Tech BG Circle -->
  <circle cx="256" cy="256" r="210" fill="url(#glowGrad)" stroke="#1e293b" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#334155" stroke-dasharray="8 8" stroke-width="1.5" opacity="0.6"/>

  <!-- Glowing background elements -->
  <g filter="url(#neonGlow)">
    <!-- Main Stylized 'A' representation (Arbitrage symbol) -->
    <path d="M 256,90 
             L 370,350 
             L 310,350 
             L 256,220 
             L 202,350 
             L 142,350 Z" 
          fill="url(#metalGrad)" 
          filter="url(#shadow)"/>
          
    <!-- Left-to-Right Arbitrage Ascent Arrow (Emerald) -->
    <path d="M 120,380 
             L 220,380 
             A 10,10 0 0,0 230,370
             L 230,280
             L 200,280
             L 200,340
             L 120,340
             Z" 
          fill="url(#arrowGrad1)" 
          transform="translate(15, -15)"/>
    <polygon points="250,265 210,295 240,320" fill="url(#arrowGrad1)" transform="translate(15, -15)"/>

    <!-- Right-to-Left Arbitrage Descent Arrow (Indigo/Teal) -->
    <path d="M 392,132 
             L 292,132 
             A 10,10 0 0,0 282,142
             L 282,232
             L 312,232
             L 312,172
             L 392,172
             Z" 
          fill="url(#arrowGrad2)" 
          transform="translate(-15, 15)"/>
    <polygon points="262,247 302,217 272,192" fill="url(#arrowGrad2)" transform="translate(-15, 15)"/>
  </g>

  <!-- Glowing accent dots -->
  <circle cx="256" cy="220" r="5" fill="#34d399" filter="url(#neonGlow)"/>
  <circle cx="160" cy="340" r="4" fill="#a7f3d0" opacity="0.8"/>
  <circle cx="352" cy="172" r="4" fill="#818cf8" opacity="0.8"/>
</svg>
